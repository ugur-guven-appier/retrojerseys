<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eagle Retro Jerseys | Shop Classics</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans">

    <nav class="nav-container border-b border-zinc-800 p-6 flex justify-between items-center sticky top-0 bg-black z-50">
        <h1 class="logo text-2xl font-black tracking-tighter cursor-pointer" onclick="showPage('home')">EAGLE RETRO</h1>
        <div class="nav-links space-x-8">
            <button onclick="showPage('home')" class="hover:text-gray-400 uppercase text-sm font-bold">Home</button>
            <button onclick="showPage('cart')" class="hover:text-gray-400 uppercase text-sm font-bold">Cart (<span id="cart-count">0</span>)</button>
        </div>
    </nav>

    <section id="home" class="page-section p-8">
        <div class="hero-text text-center my-16">
            <h2 class="text-6xl font-black mb-4 italic">VINTAGE SOUL.</h2>
            <p class="text-zinc-500 tracking-widest uppercase text-xs">Premium Retro Football Kits</p>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div onclick="filterCategory('Red')" class="cat-card border border-zinc-800 p-16 text-center cursor-pointer hover:bg-white hover:text-black transition-all">
                <h3 class="text-2xl font-bold">RED KITS</h3>
            </div>
            <div onclick="filterCategory('Blue')" class="cat-card border border-zinc-800 p-16 text-center cursor-pointer hover:bg-white hover:text-black transition-all">
                <h3 class="text-2xl font-bold">BLUE KITS</h3>
            </div>
            <div onclick="filterCategory('Yellow')" class="cat-card border border-zinc-800 p-16 text-center cursor-pointer hover:bg-white hover:text-black transition-all">
                <h3 class="text-2xl font-bold">YELLOW KITS</h3>
            </div>
        </div>
    </section>

    <section id="category" class="page-section p-8 hidden">
        <h2 id="cat-title" class="text-4xl font-black mb-12 italic border-l-4 border-white pl-4"></h2>
        <div id="product-list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-8">
            </div>
    </section>

    <section id="product-detail" class="page-section p-8 hidden">
        <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-16 items-center">
            <div class="img-wrapper">
                <img id="detail-img" src="" class="w-full grayscale hover:grayscale-0 transition-all duration-500">
            </div>
            <div class="details">
                <h2 id="detail-name" class="text-5xl font-black mb-2 uppercase"></h2>
                <p id="detail-price" class="text-2xl mb-4 text-zinc-400 font-mono"></p>
                
                <div class="mb-6">
                    <p class="text-xs font-bold uppercase tracking-widest mb-3">Select Size</p>
                    <div class="flex gap-2" id="size-selector">
                        <button onclick="selectSize('S')" class="size-btn border border-zinc-800 px-4 py-2 hover:border-white">S</button>
                        <button onclick="selectSize('M')" class="size-btn border border-zinc-800 px-4 py-2 hover:border-white">M</button>
                        <button onclick="selectSize('L')" class="size-btn border border-zinc-800 px-4 py-2 hover:border-white">L</button>
                        <button onclick="selectSize('XL')" class="size-btn border border-zinc-800 px-4 py-2 hover:border-white">XL</button>
                    </div>
                </div>
            
                <div class="mb-8">
                    <p class="text-xs font-bold uppercase tracking-widest mb-3">Quantity</p>
                    <input type="number" id="item-qty" value="1" min="1" class="bg-black border border-zinc-800 p-2 w-20 outline-none focus:border-white">
                </div>
            
                <button onclick="addToCart()" class="bg-white text-black px-12 py-4 font-black hover:bg-zinc-300 w-full transition-colors">ADD TO BAG</button>
            </div>
        </div>
    </section>

    <section id="cart" class="page-section p-8 hidden max-w-xl mx-auto">
        <h2 class="text-4xl font-black mb-10 italic">YOUR ORDER</h2>
        <div id="cart-items" class="mb-10 space-y-4"></div>

        <div id="cart-total-container" class="border-t border-zinc-800 pt-4 mb-8 flex justify-between items-center">
            <span class="text-xl font-bold uppercase tracking-widest">Total</span>
            <span id="cart-total-amount" class="text-2xl font-mono font-black text-white">$0</span>
        </div>
        
        <div id="checkout-form" class="bg-zinc-900 p-8 border border-zinc-800">
            <h3 class="text-sm font-bold mb-6 text-zinc-400 tracking-widest uppercase">Payment Details </h3>
            <div class="space-y-4">
                <input type="text" placeholder="CARD NUMBER" class="checkout-input">
                <div class="flex gap-4">
                    <input type="text" placeholder="EXP (MM/YY)" class="checkout-input w-1/2">
                    <input type="text" placeholder="CVV" class="checkout-input w-1/2">
                </div>
                <button onclick="completePurchase()" class="w-full bg-white text-black py-4 font-black mt-4 hover:bg-zinc-200">CONFIRM PURCHASE</button>
            </div>
        </div>
    </section>

    <section id="success" class="page-section p-8 hidden text-center py-32">
        <div class="inline-block border-2 border-white rounded-full p-4 mb-6">
            <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <h2 class="text-5xl font-black mb-4">PURCHASE COMPLETED</h2>
        <p class="text-zinc-500 mb-12">Your order from Eagle Retro has been confirmed.</p>
        <button onclick="showPage('home')" class="text-sm font-bold uppercase border-b-2 border-white pb-1">Return to Collection</button>
    </section>
    <footer class="border-t border-zinc-800 bg-black py-10 overflow-hidden">
        <div class="mb-6 text-center">
            <p class="text-zinc-500 text-[10px] uppercase tracking-[0.3em]">Official Vintage Partners</p>
        </div>
        
        <div class="logos-slide-container relative flex items-center">
            <div class="logos-track">
                <img src="https://upload.wikimedia.org/wikipedia/en/7/7a/Manchester_United_FC_crest.svg" alt="Man Utd" class="club-logo">
                <img src="https://upload.wikimedia.org/wikipedia/en/0/0c/Liverpool_FC.svg" alt="Liverpool" class="club-logo">
                <img src="https://upload.wikimedia.org/wikipedia/en/5/53/Arsenal_FC.svg" alt="Arsenal" class="club-logo">
                <img src="https://upload.wikimedia.org/wikipedia/en/c/cc/Chelsea_FC.svg" alt="Chelsea" class="club-logo">
                <img src="https://upload.wikimedia.org/wikipedia/en/1/1b/FC_Bayern_München_logo_%282017%29.svg" alt="Bayern" class="club-logo">
                <img src="https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg" alt="Real Madrid" class="club-logo">
                <img src="https://upload.wikimedia.org/wikipedia/en/4/47/FC_Barcelona_%28crest%29.svg" alt="Barca" class="club-logo">
                <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/AC_Milan_logo.svg" alt="AC Milan" class="club-logo">
                
                <img src="https://upload.wikimedia.org/wikipedia/en/7/7a/Manchester_United_FC_crest.svg" alt="Man Utd" class="club-logo">
                <img src="https://upload.wikimedia.org/wikipedia/en/0/0c/Liverpool_FC.svg" alt="Liverpool" class="club-logo">
                <img src="https://upload.wikimedia.org/wikipedia/en/5/53/Arsenal_FC.svg" alt="Arsenal" class="club-logo">
                <img src="https://upload.wikimedia.org/wikipedia/en/c/cc/Chelsea_FC.svg" alt="Chelsea" class="club-logo">
                <img src="https://upload.wikimedia.org/wikipedia/en/1/1b/FC_Bayern_München_logo_%282017%29.svg" alt="Bayern" class="club-logo">
                <img src="https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg" alt="Real Madrid" class="club-logo">
                <img src="https://upload.wikimedia.org/wikipedia/en/4/47/FC_Barcelona_%28crest%29.svg" alt="Barca" class="club-logo">
                <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/AC_Milan_logo.svg" alt="AC Milan" class="club-logo">
            </div>
        </div>
        
        <div class="mt-10 text-center">
            <p class="text-zinc-600 text-[10px]">© 2026 EAGLE RETRO JERSEYS. ALL RIGHTS RESERVED.</p>
        </div>
    </footer>
    <script src="script.js"></script>
    
</body>
</html>
